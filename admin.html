<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KES · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ee;--bg2:#edeae5;--bg3:#e6e2dc;
  --card:#fff;--line:#dedad4;--line2:#cac6bf;
  --t1:#1a1814;--t2:#52504c;--t3:#98958f;--t4:#c8c5be;
  --a:#8696a7;--a-d:#5c6e7e;
  --jin:#a08828;--shui:#8696a7;--mu:#528a62;--huo:#a84848;--tu:#7a6248;
  --r:10px;
}
html{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ── Login screen ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:48px 40px;width:min(420px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.04)}
.login-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;margin-bottom:6px;color:var(--t1)}
.login-sub{font-size:12px;color:var(--t3);letter-spacing:.1em;margin-bottom:32px}
.lg-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.lg-label{font-size:10px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase}
.lg-input{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;transition:border-color .2s}
.lg-input:focus{border-color:var(--a)}
.lg-btn{width:100%;margin-top:8px;padding:13px;background:var(--t1);color:#fff;border:none;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.1em;cursor:pointer;font-family:inherit}
.lg-btn:disabled{opacity:.5;cursor:default}
.lg-err{color:var(--huo);font-size:12px;margin-top:12px;text-align:center;min-height:18px}

/* ── Dashboard ── */
.dash{display:none;min-height:100vh}
.dash.on{display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
.top-l{display:flex;align-items:center;gap:16px}
.top-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--t1);letter-spacing:.1em}
.top-badge{font-size:9px;letter-spacing:.18em;color:var(--a-d);background:rgba(134,150,167,.12);padding:4px 10px;border-radius:100px;border:1px solid rgba(134,150,167,.3);text-transform:uppercase}
.top-r{display:flex;align-items:center;gap:18px;font-size:12px;color:var(--t3)}
.top-r button{background:none;border:1px solid var(--line2);color:var(--t2);padding:6px 14px;border-radius:100px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.06em}
.top-r button:hover{color:var(--t1);border-color:var(--t1)}

.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--line);padding:0 32px;overflow-x:auto}
.tab{padding:14px 22px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.06em;white-space:nowrap}
.tab.on{color:var(--t1);border-bottom-color:var(--t1)}
.tab:hover{color:var(--t1)}

.content{padding:28px 32px;flex:1}
.panel{display:none}
.panel.on{display:block}

/* ── Cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:8px}
.stat-label{font-size:10px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--t1);line-height:1}
.stat-sub{font-size:11px;color:var(--t3)}

/* ── Tables ── */
.t-head{display:grid;padding:12px 16px;background:var(--bg3);font-size:10px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;border-radius:8px 8px 0 0;border:1px solid var(--line);border-bottom:none}
.t-row{display:grid;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-top:none;font-size:13px;cursor:pointer;transition:background .15s}
.t-row:hover{background:var(--bg2)}
.t-row:last-child{border-radius:0 0 8px 8px}
.t-cell{display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.tb-wrap{margin-bottom:32px}
.tb-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tb-title h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--t1)}
.tb-title .btn{padding:10px 20px;background:var(--t1);color:#fff;border:none;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;font-family:inherit}
.tb-title .btn:hover{background:#000}
.btn-sec{padding:8px 16px;background:var(--card);color:var(--t2);border:1px solid var(--line2);border-radius:100px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.06em}
.btn-sec:hover{border-color:var(--t1);color:var(--t1)}
.btn-danger{padding:8px 16px;background:var(--huo);color:#fff;border:none;border-radius:100px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.06em}

.search{padding:10px 14px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);outline:none;width:260px}
.search:focus{border-color:var(--a)}

/* ── Badge ── */
.pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;letter-spacing:.06em;font-weight:500}
.pill-paid{background:rgba(82,138,98,.12);color:var(--mu);border:1px solid rgba(82,138,98,.25)}
.pill-unpaid{background:var(--bg3);color:var(--t3);border:1px solid var(--line2)}
.pill-active{background:rgba(82,138,98,.12);color:var(--mu);border:1px solid rgba(82,138,98,.25)}
.pill-archived{background:rgba(168,72,72,.1);color:var(--huo);border:1px solid rgba(168,72,72,.2)}
.pill-opt{background:rgba(134,150,167,.12);color:var(--a-d);border:1px solid rgba(134,150,167,.25)}

.thumb{width:40px;height:40px;border-radius:6px;background:var(--bg3);object-fit:cover;border:1px solid var(--line);flex-shrink:0}

/* ── Drawer ── */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-bg.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(720px,92vw);background:var(--bg);border-left:1px solid var(--line);z-index:101;transform:translateX(100%);transition:transform .3s;overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.1)}
.drawer.on{transform:translateX(0)}
.drawer-head{display:flex;justify-content:space-between;align-items:center;padding:20px 28px;border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:1}
.drawer-head h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.drawer-head button{background:none;border:none;font-size:24px;color:var(--t3);cursor:pointer;line-height:1}
.drawer-body{padding:24px 28px}
.drawer-sec{margin-bottom:32px}
.drawer-sec h3{font-size:11px;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;margin-bottom:12px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.modal-bg.on{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:14px;width:min(640px,94vw);max-height:92vh;overflow-y:auto;box-shadow:0 12px 60px rgba(0,0,0,.18)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:1}
.modal-head h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.modal-head button{background:none;border:none;font-size:24px;color:var(--t3);cursor:pointer;line-height:1}
.modal-body{padding:24px 28px}
.form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-row label{font-size:10px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--a)}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.img-drop{border:2px dashed var(--line2);border-radius:10px;padding:24px;text-align:center;color:var(--t3);font-size:12px;cursor:pointer;transition:border-color .15s,background .15s;background:var(--bg2)}
.img-drop:hover{border-color:var(--a);background:rgba(134,150,167,.06)}
.img-drop.dragover{border-color:var(--mu);background:rgba(82,138,98,.06)}
.img-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.img-item{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.img-item img{width:100%;height:100%;object-fit:cover}
.img-item button{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:10px;line-height:18px;padding:0}

.modal-foot{padding:16px 28px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}

.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 16px;font-size:13px;margin-bottom:4px}
.kv-k{color:var(--t3);font-size:11px;letter-spacing:.06em}
.kv-v{color:var(--t1);word-break:break-word}

.empty{padding:40px 20px;text-align:center;color:var(--t3);font-size:12px;background:var(--bg2);border-radius:8px;border:1px dashed var(--line2)}
.loader{padding:40px;text-align:center;color:var(--t3);font-size:12px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--t1);color:#fff;padding:12px 24px;border-radius:100px;font-size:12px;z-index:500;opacity:0;transition:all .25s;pointer-events:none;letter-spacing:.04em}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--huo)}

/* Sparkline */
.sparkline{width:100%;height:42px;margin-top:6px}

.report-preview{max-height:400px;overflow:auto;background:var(--bg2);padding:16px;border-radius:8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--t2);white-space:pre-wrap;word-break:break-all;border:1px solid var(--line)}

@media(max-width:640px){
  .topbar{padding:12px 18px}
  .content{padding:20px 16px}
  .tabs{padding:0 16px}
  .tab{padding:12px 14px}
  .search{width:100%}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginView" class="login-wrap">
  <div class="login-box">
    <div class="login-title">KES Admin</div>
    <div class="login-sub">OPERATIONAL CONSOLE</div>
    <div class="lg-field">
      <label class="lg-label">Username</label>
      <input id="lgUser" class="lg-input" type="text" autocomplete="username" spellcheck="false">
    </div>
    <div class="lg-field">
      <label class="lg-label">Password</label>
      <input id="lgPass" class="lg-input" type="password" autocomplete="current-password">
    </div>
    <button id="lgBtn" class="lg-btn">Sign In</button>
    <div id="lgErr" class="lg-err"></div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashView" class="dash">
  <div class="topbar">
    <div class="top-l">
      <div class="top-brand">KES</div>
      <div class="top-badge">ADMIN</div>
    </div>
    <div class="top-r">
      <span id="tokenExp"></span>
      <button onclick="adminLogout()">Sign Out</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="stats">Stats</div>
    <div class="tab" data-tab="products">Products</div>
    <div class="tab" data-tab="users">Users</div>
    <div class="tab" data-tab="orders">Orders</div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="panel on" id="panel-stats">
      <div id="statsHost" class="loader">Loading stats…</div>
    </div>

    <!-- PRODUCTS -->
    <div class="panel" id="panel-products">
      <div class="tb-wrap">
        <div class="tb-title">
          <h2>Products</h2>
          <button class="btn" onclick="openProductModal()">+ New Product</button>
        </div>
        <div id="prodHost" class="loader">Loading…</div>
      </div>
    </div>

    <!-- USERS -->
    <div class="panel" id="panel-users">
      <div class="tb-wrap">
        <div class="tb-title">
          <h2>Users</h2>
          <input id="userSearch" class="search" placeholder="Search email or name…" oninput="debouncedUserSearch()">
        </div>
        <div id="userHost" class="loader">Loading…</div>
      </div>
    </div>

    <!-- ORDERS -->
    <div class="panel" id="panel-orders">
      <div class="tb-wrap">
        <div class="tb-title">
          <h2>Orders</h2>
        </div>
        <div id="orderHost" class="loader">Loading…</div>
      </div>
    </div>

  </div>
</div>

<!-- ══ USER DRAWER ══ -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="drawerTitle">User Detail</h2>
    <button onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- ══ PRODUCT MODAL ══ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New Product</h2>
      <button onclick="closeProductModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeProductModal()">Cancel</button>
      <button class="btn-sec" id="modalSaveBtn" onclick="saveProduct()" style="background:var(--t1);color:#fff;border-color:var(--t1)">Save</button>
    </div>
  </div>
</div>

<!-- ══ Toast ══ -->
<div class="toast" id="toast"></div>

<script src="kes-admin.js"></script>
</body>
</html>
